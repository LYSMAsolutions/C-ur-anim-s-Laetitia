<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>❤️ Pour Laetitia</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #1e293b, #020617);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;
  }

  .container {
    text-align: center;
  }

  h1 {
    font-weight: 300;
    margin-bottom: 30px;
    letter-spacing: 2px;
  }

  /* ❤️ SVG cœur */
  svg {
    width: 250px;
    height: 250px;
  }

  path {
    fill: none;
    stroke: #ff4d6d;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;

    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;

    animation: draw 3s ease forwards, pulse 1.5s ease-in-out infinite 3s;
  }

  /* ✏️ animation dessin */
  @keyframes draw {
    to {
      stroke-dashoffset: 0;
    }
  }

  /* 💓 battement */
  @keyframes pulse {
    0%, 100% {
      transform: scale(1);
      filter: drop-shadow(0 0 5px #ff4d6d);
    }
    50% {
      transform: scale(1.05);
      filter: drop-shadow(0 0 20px #ff4d6d);
    }
  }

  .message {
    margin-top: 30px;
    font-size: 20px;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
    animation-delay: 3s;
  }

  @keyframes fadeIn {
    to {
      opacity: 1;
      transform: translateY(-10px);
    }
  }

</style>
</head>

<body>

<div class="container">
  <h1>Pour toi ❤️</h1>

  <!-- ❤️ vrai tracé de cœur -->
  <svg viewBox="0 0 32 29.6">
    <path d="M23.6,0c-3.4,0-6.3,2.1-7.6,5.1C14.7,2.1,11.8,0,8.4,0
    C3.8,0,0,3.8,0,8.4c0,9.4,16,21.2,16,21.2s16-11.8,16-21.2
    C32,3.8,28.2,0,23.6,0z"/>
  </svg>

  <div class="message">Je t’aime ❤️</div>
</div>

</body>
</html>
