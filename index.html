<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Heart</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #111325 0%, #07080f 45%, #020307 100%);
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .label {
      position: fixed;
      top: 6vh;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.9);
      font-size: clamp(16px, 2vw, 24px);
      letter-spacing: 0.08em;
      text-shadow: 0 0 12px rgba(255,255,255,0.25);
      pointer-events: none;
      user-select: none;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="label">Pour Laetitia ✨</div>
  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    let w = 0;
    let h = 0;
    let cx = 0;
    let cy = 0;
    let scale = 0;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      cx = w / 2;
      cy = h / 2 + 20;
      scale = Math.min(w, h) * 0.018;
    }

    window.addEventListener("resize", resize);
    resize();

    const trail = [];
    const sparks = [];
    const stars = [];

    for (let i = 0; i < 180; i++) {
      stars.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 1.6 + 0.2,
        a: Math.random() * 0.6 + 0.15,
        tw: Math.random() * Math.PI * 2
      });
    }

    function heartPoint(t) {
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13 * Math.cos(t)
              - 5 * Math.cos(2 * t)
              - 2 * Math.cos(3 * t)
              - Math.cos(4 * t);
      return {
        x: cx + x * scale,
        y: cy - y * scale
      };
    }

    function gradientColor(p) {
      const r = Math.round(255 - 35 * p);
      const g = Math.round(180 - 110 * p);
      const b = Math.round(255 - 25 * p);
      return `rgb(${r},${g},${b})`;
    }

    function spawnSpark(x, y, dir) {
      const angle = dir + (Math.random() - 0.5) * 1.2;
      const speed = Math.random() * 2.2 + 0.4;
      sparks.push({
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: Math.random() * 28 + 20,
        maxLife: 48,
        size: Math.random() * 2.4 + 0.8,
        hue: Math.random() < 0.5 ? 300 : 260
      });
    }

    let t = 0.35;
    const speed = 0.018;

    function drawBackground() {
      ctx.fillStyle = "rgba(2,3,7,0.22)";
      ctx.fillRect(0, 0, w, h);

      for (const s of stars) {
        s.tw += 0.015;
        const alpha = s.a + Math.sin(s.tw) * 0.12;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(210,220,255,${Math.max(0.05, alpha)})`;
        ctx.fill();
      }
    }

    function drawTrail() {
      for (let i = 0; i < trail.length; i++) {
        const p = trail[i];
        const k = i / trail.length;
        const radius = 1.5 + k * 4.5;

        ctx.beginPath();
        ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = gradientColor(k);
        ctx.globalAlpha = 0.03 + k * 0.14;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(p.x, p.y, radius * 2.4, 0, Math.PI * 2);
        ctx.fillStyle = gradientColor(k);
        ctx.globalAlpha = 0.015 + k * 0.05;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawSparks() {
      for (let i = sparks.length - 1; i >= 0; i--) {
        const s = sparks[i];
        s.x += s.vx;
        s.y += s.vy;
        s.vx *= 0.986;
        s.vy *= 0.986;
        s.life -= 1;

        if (s.life <= 0) {
          sparks.splice(i, 1);
          continue;
        }

        const a = s.life / s.maxLife;

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${s.hue}, 100%, 75%, ${a * 0.9})`;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size * 3.5, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${s.hue}, 100%, 70%, ${a * 0.12})`;
        ctx.fill();
      }
    }

    function drawHead(x, y) {
      ctx.beginPath();
      ctx.arc(x, y, 7, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,245,255,1)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(x, y, 16, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,170,255,0.16)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(x, y, 28, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(210,120,255,0.07)";
      ctx.fill();
    }

    function animate() {
      drawBackground();

      const p = heartPoint(t);
      const pNext = heartPoint(t + 0.01);
      const dir = Math.atan2(pNext.y - p.y, pNext.x - p.x);

      trail.push({ x: p.x, y: p.y });
      if (trail.length > 420) trail.shift();

      for (let i = 0; i < 7; i++) {
        spawnSpark(p.x, p.y, dir + Math.PI);
      }

      drawTrail();
      drawSparks();
      drawHead(p.x, p.y);

      t += speed;
      if (t > Math.PI * 2 + 0.35) {
        t = 0.35;
        trail.length = 0;
      }

      requestAnimationFrame(animate);
    }

    ctx.fillStyle = "#020307";
    ctx.fillRect(0, 0, w, h);
    animate();
  </script>
</body>
</html>
