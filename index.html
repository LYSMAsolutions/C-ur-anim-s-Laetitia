<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>❤️ Heart Animation</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #070010;
  }

  canvas {
    display: block;
  }

  .text {
    position: absolute;
    top: 20%;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 20px;
    font-family: sans-serif;
    opacity: 0.8;
  }
</style>
</head>

<body>

<div class="text">Je t'aime ❤️</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

// ❤️ formule cœur
function heart(t) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3),
    y:
      13 * Math.cos(t) -
      5 * Math.cos(2 * t) -
      2 * Math.cos(3 * t) -
      Math.cos(4 * t),
  };
}

// créer particules
for (let i = 0; i < 1000; i++) {
  let t = Math.random() * Math.PI * 2;
  let pos = heart(t);

  particles.push({
    x: pos.x,
    y: pos.y,
    size: Math.random() * 2 + 1,
    alpha: Math.random(),
    speed: Math.random() * 0.02 + 0.01,
    t: t,
  });
}

function draw() {
  ctx.fillStyle = "rgba(7,0,16,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p) => {
    p.t += p.speed;
    let pos = heart(p.t);

    let scale = 15;
    let x = canvas.width / 2 + pos.x * scale;
    let y = canvas.height / 2 - pos.y * scale;

    ctx.beginPath();
    ctx.arc(x, y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 80, 120, ${p.alpha})`;
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
