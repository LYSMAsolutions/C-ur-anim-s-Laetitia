<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>❤️ Pour Laetitia</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0F172A, #1E293B);
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      color: white;
    }

    h1 {
      font-weight: 300;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    /* ❤️ CŒUR */
    .heart {
      position: relative;
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #ff4d6d, #ff1e4d);
      transform: rotate(45deg);
      margin: 0 auto;
      animation: beat 1s infinite;
      box-shadow: 0 0 40px rgba(255, 77, 109, 0.6);
      cursor: pointer;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      background: inherit;
      border-radius: 50%;
    }

    .heart::before {
      top: -60px;
      left: 0;
    }

    .heart::after {
      left: -60px;
      top: 0;
    }

    @keyframes beat {
      0%, 100% {
        transform: rotate(45deg) scale(1);
      }
      50% {
        transform: rotate(45deg) scale(1.1);
      }
    }

    /* ✨ Message */
    .message {
      margin-top: 40px;
      font-size: 18px;
      opacity: 0;
      transition: 0.4s ease;
    }

    .show {
      opacity: 1;
      transform: translateY(-10px);
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>Pour toi ❤️</h1>

    <div class="heart" onclick="showMessage()"></div>

    <div id="msg" class="message">
      Je t’aime ❤️
    </div>
  </div>

  <script>
    function showMessage() {
      document.getElementById('msg').classList.toggle('show');
    }
  </script>

</body>
</html>
